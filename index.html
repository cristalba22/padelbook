<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Arena Norte Padel Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fuentes de la marca -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta
      name="description"
      content="Sistema de reservas online para clubes de pádel. Gestión de turnos, torneos y profesores."
    />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 30%, rgba(61, 247, 168, 0.18), transparent 34%),
          linear-gradient(180deg, #050814 0%, #020617 100%);
        color: #f8fafc;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      .app-loader__card {
        display: grid;
        place-items: center;
        gap: 18px;
        text-align: center;
      }

      .app-loader__logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(190, 242, 100, 0.9);
        background: rgba(5, 8, 20, 0.78);
        padding: 10px 14px;
        font: 900 18px/1 Inter, system-ui, sans-serif;
        letter-spacing: -0.04em;
        box-shadow: 0 0 34px rgba(61, 247, 168, 0.22);
      }

      .app-loader__logo span:first-child {
        color: #bef264;
      }

      .app-loader__pulse {
        width: 148px;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
      }

      .app-loader__pulse::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #3df7a8, #bef264);
        animation: loader-slide 880ms ease-in-out infinite;
      }

      .app-loader__text {
        margin: 0;
        color: #94a3b8;
        font: 700 11px/1 Inter, system-ui, sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      #app-loader.app-loader--hidden {
        opacity: 0;
        visibility: hidden;
      }

      @keyframes loader-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(260%); }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loader__pulse::before {
          animation: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-label="Cargando PadelBook">
      <div class="app-loader__card">
        <div class="app-loader__logo"><span>PADEL</span><span>BOOK</span></div>
        <div class="app-loader__pulse" aria-hidden="true"></div>
        <p class="app-loader__text">Reservas online</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
